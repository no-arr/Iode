name: 🚥 iOS Build
on: push

jobs:
  tests:
    name: 👀 Building  on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      # Smaller cache size
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        name: 🧾 Checkout

      - uses: actions/setup-dotnet@v4
        name: 💽 Setup .NET SDK
        with:
          dotnet-version: '8.0.107'

      - name: 📦 Restore Dependencies
        run: dotnet restore

      - uses: chickensoft-games/setup-godot@v2
        name: 🤖 Setup Godot
        with:
          # Version must include major, minor, and patch, and be >= 4.0.0
          # Pre-release label is optional.
          version: 4.5.0-beta.1 # also valid: 4.0.0.rc1 or 4.0.0 or "global.json", etc
          # Use .NET-enabled version of Godot (the default is also true).
          use-dotnet: true
          # Include the Godot Export Templates (the default is false).
          include-templates: true

      - name: 🧑‍🔬 Generate .NET Bindings
        run: godot --headless --build-solutions --quit || exit 0

      - name: 🦺 Build Projects
        run: dotnet build --configuration Debug

      - name: 📦 Export Game (MacOS Headless)
        run: |
            mkdir -p ios_export
            godot --headless --export-debug "iOS" ios_export/iode.zip
      
      - name: 🧪 Compiling ipa
        run: | 
            cd ios_export
            xcodebuild archive -project iode.xcodeproj -scheme 'iode' -archivePath Iode-Project.xcarchive -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
            #mkdir Payload
            mv Iode-Project.xcarchive ${{ runner.temp }}/Iode-Project.xcarchive
            ls
        
      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Iode-Project
          path: ${{ runner.temp }}/Iode-Project.xcarchive
          # you can also archive the entire directory
          # path: ${{ runner.temp }}/build
          retention-days: 3